<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Status Pesanan - Cici Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { DEFAULT: '#EC4899', light: '#F472B6', dark: '#BE185D' },
                    }
                }
            }
        }
    </script>
    <style>
        * { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #EC4899 0%, #F472B6 50%, #FBB6D0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn-primary {
            background: linear-gradient(135deg, #EC4899 0%, #F472B6 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #BE185D 0%, #EC4899 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(236, 72, 153, 0.5);
        }
        .search-input {
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: #EC4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.2);
        }
        .status-diproses { background: #FEF3C7; color: #D97706; }
        .dark .status-diproses { background: rgba(217, 119, 6, 0.2); color: #FBBF24; }
        .status-berhasil { background: #D1FAE5; color: #059669; }
        .dark .status-berhasil { background: rgba(5, 150, 105, 0.2); color: #34D399; }
        .status-ditolak { background: #FEE2E2; color: #DC2626; }
        .dark .status-ditolak { background: rgba(220, 38, 38, 0.2); color: #F87171; }
        .timeline-item { position: relative; padding-left: 2rem; }
        .timeline-item::before {
            content: ''; position: absolute; left: 0; top: 0.5rem;
            width: 0.75rem; height: 0.75rem; border-radius: 50%; background: #EC4899;
        }
        .timeline-item::after {
            content: ''; position: absolute; left: 0.35rem; top: 1.25rem;
            width: 2px; height: calc(100% - 1rem); background: #E5E7EB;
        }
        .dark .timeline-item::after { background: #374151; }
        .timeline-item:last-child::after { display: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white transition-colors duration-300 min-h-screen">

    <nav class="fixed w-full z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border-b border-pink-200/20 dark:border-pink-500/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-500 to-pink-600 flex items-center justify-center shadow-lg">
                        <i class="fas fa-heart text-white text-lg"></i>
                    </div>
                    <span class="text-xl font-bold gradient-text">Cici Store</span>
                </a>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-pink-50 dark:hover:bg-pink-500/10 transition-colors">
                        <i id="darkModeIcon" class="fas fa-moon text-gray-600 dark:text-yellow-400 text-lg"></i>
                    </button>
                    <a href="index.html" class="text-gray-600 dark:text-gray-300 hover:text-pink-500 transition-colors">
                        <i class="fas fa-arrow-left mr-1"></i> Kembali
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-pink-500/20 to-pink-600/20 mb-4">
                <i class="fas fa-search text-pink-500 text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">Cek Status Pesanan</h1>
            <p class="text-gray-600 dark:text-gray-400">Masukkan nomor invoice untuk melihat status</p>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 border border-pink-200/20 dark:border-pink-500/10 mb-8">
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="flex-1 relative">
                    <i class="fas fa-receipt absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="invoiceInput" class="search-input w-full pl-12 pr-4 py-4 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none text-lg font-mono" placeholder="CC-XXXXX" onkeypress="if(event.key==='Enter')searchOrder()">
                </div>
                <button onclick="searchOrder()" class="btn-primary px-8 py-4 rounded-xl text-white font-semibold flex items-center justify-center space-x-2 min-w-[140px]">
                    <i class="fas fa-search"></i>
                    <span>Cari</span>
                </button>
            </div>
            <p class="text-sm text-gray-500 mt-3 ml-1">Contoh: CC-ABC12</p>
        </div>

        <div id="recentOrdersSection" class="mb-8">
            <h2 class="text-xl font-bold mb-4 flex items-center space-x-2">
                <i class="fas fa-history text-pink-500"></i>
                <span>Pesanan Terbaru</span>
            </h2>
            <div id="recentOrdersList" class="space-y-4"></div>
        </div>

        <div id="orderResult" class="hidden"></div>
        <div id="noResult" class="hidden text-center py-12">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gray-100 dark:bg-gray-800 mb-4">
                <i class="fas fa-inbox text-gray-400 text-3xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">Pesanan Tidak Ditemukan</h3>
            <p class="text-gray-600 dark:text-gray-400">Nomor invoice yang Anda masukkan tidak valid.</p>
        </div>
    </main>

    <!-- Compact Footer -->
    <footer class="bg-gray-900 text-white py-4 border-t border-pink-500/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-3 text-sm">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-heart text-pink-500"></i>
                    <span class="font-bold">Cici Store</span>
                </div>
                <div class="text-gray-500 text-xs"> 2026 Cici Store</div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initDarkMode();
            loadRecentOrders();
            const urlParams = new URLSearchParams(window.location.search);
            const invoice = urlParams.get('invoice');
            if (invoice) {
                document.getElementById('invoiceInput').value = invoice;
                searchOrder();
            }
        });

        function loadRecentOrders() {
            const orders = JSON.parse(localStorage.getItem('cici_orders') || '[]');
            const recentOrders = orders.slice(-5).reverse();
            const container = document.getElementById('recentOrdersList');
            
            if (recentOrders.length === 0) {
                document.getElementById('recentOrdersSection').style.display = 'none';
                return;
            }

            container.innerHTML = recentOrders.map(order => `
                <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-pink-200/20 dark:border-pink-500/10 cursor-pointer hover:shadow-lg transition-all" onclick="fillInvoice('${order.invoice}')">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-mono font-bold text-pink-500 mb-1">${order.invoice}</div>
                            <div class="text-sm text-gray-600 dark:text-gray-400">${order.customer.name}</div>
                            <div class="text-xs text-gray-500 mt-1">${formatDate(order.date)}</div>
                        </div>
                        <div class="text-right">
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold ${getStatusClass(order.status)}">
                                <i class="fas fa-${getStatusIcon(order.status)} mr-1"></i>${order.status}
                            </span>
                            <div class="text-sm font-semibold mt-2">Rp${formatPrice(order.total)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function fillInvoice(invoice) {
            document.getElementById('invoiceInput').value = invoice;
            searchOrder();
        }

        function getStatusClass(status) {
            return 'status-' + status.toLowerCase();
        }

        function searchOrder() {
            const invoice = document.getElementById('invoiceInput').value.trim().toUpperCase();
            if (!invoice) {
                Swal.fire({ icon: 'warning', title: 'Masukkan Invoice', text: 'Silakan masukkan nomor invoice', confirmButtonColor: '#EC4899' });
                return;
            }

            const orders = JSON.parse(localStorage.getItem('cici_orders') || '[]');
            const order = orders.find(o => o.invoice.toUpperCase() === invoice);

            const resultDiv = document.getElementById('orderResult');
            const noResultDiv = document.getElementById('noResult');
            const recentSection = document.getElementById('recentOrdersSection');

            if (!order) {
                resultDiv.classList.add('hidden');
                noResultDiv.classList.remove('hidden');
                recentSection.style.display = 'none';
                return;
            }

            noResultDiv.classList.add('hidden');
            recentSection.style.display = 'none';
            resultDiv.classList.remove('hidden');

            resultDiv.innerHTML = `
                <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-pink-200/20 dark:border-pink-500/10 overflow-hidden">
                    <div class="bg-gradient-to-r from-pink-500 to-pink-600 p-6 text-white">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-pink-200 text-sm mb-1">Nomor Invoice</p>
                                <h2 class="text-2xl font-bold font-mono">${order.invoice}</h2>
                            </div>
                            <span class="inline-flex items-center px-4 py-2 rounded-full bg-white/20 text-white font-semibold text-sm">
                                <i class="fas fa-${getStatusIcon(order.status)} mr-2"></i>${order.status}
                            </span>
                        </div>
                    </div>

                    <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                        <h3 class="font-bold mb-4 text-pink-500">Informasi Pemesan</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div class="p-3 bg-gray-50 dark:bg-gray-900 rounded-lg">
                                <p class="text-xs text-gray-500 mb-1">Nama</p>
                                <p class="font-medium">${order.customer.name}</p>
                            </div>
                            <div class="p-3 bg-gray-50 dark:bg-gray-900 rounded-lg">
                                <p class="text-xs text-gray-500 mb-1">Email</p>
                                <p class="font-medium">${order.customer.email}</p>
                            </div>
                            <div class="p-3 bg-gray-50 dark:bg-gray-900 rounded-lg">
                                <p class="text-xs text-gray-500 mb-1">WhatsApp</p>
                                <p class="font-medium">${order.customer.phone}</p>
                            </div>
                        </div>
                    </div>

                    <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                        <h3 class="font-bold mb-4 text-pink-500">Detail Pesanan</h3>
                        <div class="space-y-3">
                            ${order.items.map(item => `
                                <div class="flex justify-between items-center p-3 bg-gray-50 dark:bg-gray-900 rounded-lg">
                                    <div class="flex items-center space-x-3">
                                        <div class="w-8 h-8 rounded-lg bg-pink-500/10 flex items-center justify-center">
                                            <i class="fas fa-box text-pink-500 text-xs"></i>
                                        </div>
                                        <div>
                                            <p class="font-medium">${item.productName}</p>
                                            <p class="text-sm text-gray-500">${item.qty} x Rp${formatPrice(item.price)}</p>
                                        </div>
                                    </div>
                                    <span class="font-semibold">Rp${formatPrice(item.price * item.qty)}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700 flex justify-between items-center">
                            <span class="font-bold text-lg">Total</span>
                            <span class="font-bold text-2xl text-pink-500">Rp${formatPrice(order.total)}</span>
                        </div>
                    </div>

                    <div class="p-6">
                        <h3 class="font-bold mb-4 text-pink-500">Timeline</h3>
                        <div class="space-y-6">
                            ${getTimeline(order.status)}
                        </div>
                    </div>

                    <div class="p-6 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50">
                        <div class="flex flex-col sm:flex-row gap-3">
                            <a href="https://wa.me/62${getAdminWhatsApp()}?text=Halo%20admin,%20saya%20ingin%20menanyakan%20pesanan%20${order.invoice}" target="_blank" class="flex-1 btn-primary py-3 rounded-xl text-white font-semibold text-center flex items-center justify-center space-x-2">
                                <i class="fab fa-whatsapp"></i>
                                <span>Hubungi Admin</span>
                            </a>
                            <button onclick="window.print()" class="flex-1 py-3 rounded-xl border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition-all flex items-center justify-center space-x-2">
                                <i class="fas fa-print"></i>
                                <span>Cetak</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;

            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function getTimeline(status) {
            const steps = [
                { title: 'Pesanan Dibuat', desc: 'Pesanan berhasil dibuat', icon: 'file-alt', completed: true },
                { title: 'Menunggu Pembayaran', desc: 'Menunggu konfirmasi dari admin', icon: 'clock', completed: status !== 'Ditolak' },
                { title: 'Pesanan Diproses', desc: 'Admin sedang memproses', icon: 'cog', completed: status === 'Berhasil' || status === 'Ditolak' },
                { title: status === 'Berhasil' ? 'Selesai' : status === 'Ditolak' ? 'Ditolak' : 'Menunggu', desc: status === 'Berhasil' ? 'Pesanan selesai' : status === 'Ditolak' ? 'Pesanan ditolak' : 'Menunggu konfirmasi', icon: status === 'Berhasil' ? 'check-circle' : status === 'Ditolak' ? 'times-circle' : 'hourglass-half', completed: status === 'Berhasil' || status === 'Ditolak' }
            ];

            return steps.map((step, index) => {
                const isCompleted = step.completed;
                const isActive = index === 0 || (index === 1 && status !== 'Ditolak') || (index === 2 && (status === 'Berhasil' || status === 'Ditolak'));
                
                return `
                    <div class="timeline-item">
                        <div class="flex items-start space-x-3">
                            <div class="w-8 h-8 rounded-full ${isCompleted ? 'bg-green-100 dark:bg-green-900/30 text-green-600' : isActive ? 'bg-pink-100 dark:bg-pink-900/30 text-pink-600' : 'bg-gray-100 dark:bg-gray-800 text-gray-400'} flex items-center justify-center flex-shrink-0">
                                <i class="fas fa-${step.icon} text-sm"></i>
                            </div>
                            <div>
                                <p class="font-semibold ${isCompleted ? 'text-green-600 dark:text-green-400' : isActive ? 'text-pink-600 dark:text-pink-400' : 'text-gray-400'}">${step.title}</p>
                                <p class="text-sm text-gray-500">${step.desc}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
